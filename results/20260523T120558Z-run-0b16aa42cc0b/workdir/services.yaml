version: 1
services:
  catalog:
    image: catalog:1.3.0
    replicas: 2
    health_check:
      path: /healthz
      interval_seconds: 15
      timeout_seconds: 4
  fetcher:
    image: fetcher:0.9.2
    replicas: 1
    health_check:
      path: /ready
      interval_seconds: 30
      timeout_seconds: 6
  leaderboard:
    image: leaderboard:2.4.0
    replicas: 3
    health_check:
      path: /api/health
      interval_seconds: 20
      timeout_seconds: 5
